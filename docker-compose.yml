services:
  backend-1:
    build:
      context: ./Backend
    container_name: grocery-backend-1
    env_file:
      - ./Backend/.env
    environment:
      PORT: 5000
      REDIS_CLUSTER: "true"
      REDIS_NODES: redis-node-1:7001,redis-node-2:7002,redis-node-3:7003,redis-node-4:7004,redis-node-5:7005,redis-node-6:7006,redis-node-7:7007,redis-node-8:7008
      KAFKA_BROKER: kafka:9092
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
      - redis-node-7
      - redis-node-8
      - kafka
    ports:
      - "5000:5000"
    restart: unless-stopped

  backend-2:
    build:
      context: ./Backend
    container_name: grocery-backend-2
    env_file:
      - ./Backend/.env
    environment:
      PORT: 5001
      REDIS_CLUSTER: "true"
      REDIS_NODES: redis-node-1:7001,redis-node-2:7002,redis-node-3:7003,redis-node-4:7004,redis-node-5:7005,redis-node-6:7006,redis-node-7:7007,redis-node-8:7008
      KAFKA_BROKER: kafka:9092
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
      - redis-node-7
      - redis-node-8
      - kafka
    ports:
      - "5001:5001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: grocery-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: grocery-nginx
    depends_on:
      - backend-1
      - backend-2
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  redis-node-1:
    image: redis:7.2
    container_name: redis-node-1
    command: redis-server /usr/local/etc/redis/node-1.conf
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - ./redis/config-node/node-1.conf:/usr/local/etc/redis/node-1.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-2:
    image: redis:7.2
    container_name: redis-node-2
    command: redis-server /usr/local/etc/redis/node-2.conf
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - ./redis/config-node/node-2.conf:/usr/local/etc/redis/node-2.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-3:
    image: redis:7.2
    container_name: redis-node-3
    command: redis-server /usr/local/etc/redis/node-3.conf
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - ./redis/config-node/node-3.conf:/usr/local/etc/redis/node-3.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-4:
    image: redis:7.2
    container_name: redis-node-4
    command: redis-server /usr/local/etc/redis/node-4.conf
    ports:
      - "7004:7004"
      - "17004:17004"
    volumes:
      - ./redis/config-node/node-4.conf:/usr/local/etc/redis/node-4.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-5:
    image: redis:7.2
    container_name: redis-node-5
    command: redis-server /usr/local/etc/redis/node-5.conf
    ports:
      - "7005:7005"
      - "17005:17005"
    volumes:
      - ./redis/config-node/node-5.conf:/usr/local/etc/redis/node-5.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-6:
    image: redis:7.2
    container_name: redis-node-6
    command: redis-server /usr/local/etc/redis/node-6.conf
    ports:
      - "7006:7006"
      - "17006:17006"
    volumes:
      - ./redis/config-node/node-6.conf:/usr/local/etc/redis/node-6.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-7:
    image: redis:7.2
    container_name: redis-node-7
    command: redis-server /usr/local/etc/redis/node-7.conf
    ports:
      - "7007:7007"
      - "17007:17007"
    volumes:
      - ./redis/config-node/node-7.conf:/usr/local/etc/redis/node-7.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-node-8:
    image: redis:7.2
    container_name: redis-node-8
    command: redis-server /usr/local/etc/redis/node-8.conf
    ports:
      - "7008:7008"
      - "17008:17008"
    volumes:
      - ./redis/config-node/node-8.conf:/usr/local/etc/redis/node-8.conf:ro
    networks:
      - redis-cluster
    restart: unless-stopped

  redis-cluster-init:
    image: redis:7.2
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
      - redis-node-7
      - redis-node-8
    entrypoint:
      - sh
      - -c
      - |
        sleep 5
        redis-cli --cluster create \
          redis-node-1:7001 redis-node-2:7002 redis-node-3:7003 redis-node-4:7004 \
          redis-node-5:7005 redis-node-6:7006 redis-node-7:7007 redis-node-8:7008 \
          --cluster-replicas 0 --cluster-yes || true
    networks:
      - redis-cluster
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  signup-worker:
    build:
      context: ./Backend
    container_name: grocery-signup-worker
    env_file:
      - ./Backend/.env
    environment:
      KAFKA_BROKER: kafka:9092
      REDIS_CLUSTER: "true"
      REDIS_NODES: redis-node-1:7001,redis-node-2:7002,redis-node-3:7003,redis-node-4:7004,redis-node-5:7005,redis-node-6:7006,redis-node-7:7007,redis-node-8:7008
    command: ["node", "workers/signupWorker.js"]
    depends_on:
      - kafka
    restart: unless-stopped

  email-consumer:
    build:
      context: ./kafka
    image: node:20-alpine
    container_name: grocery-email-consumer
    working_dir: /app
    volumes:
      - ./kafka:/app
      - ./Backend:/Backend
    env_file:
      - ./Backend/.env
    environment:
      KAFKA_BROKER: kafka:9092
    command: ["node", "consumers/emailConsumer.js"]
    depends_on:
      - kafka
    restart: unless-stopped

  inventory-consumer:
    build:
      context: ./kafka
    image: node:20-alpine
    container_name: grocery-inventory-consumer
    working_dir: /app
    volumes:
      - ./kafka:/app
    environment:
      KAFKA_BROKER: kafka:9092
    command: ["node", "consumers/inventoryConsumer.js"]
    depends_on:
      - kafka
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./Monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - nginx
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    restart: unless-stopped

networks:
  redis-cluster:
    driver: bridge
